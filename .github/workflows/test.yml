name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install pytest

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q
